vich_uploader:
    db_driver: orm

    mappings:
        user_document:
            uri_prefix: /uploads/documents
            upload_destination: '%kernel.project_dir%/public/uploads/documents'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        
        user_image:
            uri_prefix: /uploads/images
            upload_destination: '%kernel.project_dir%/public/uploads/images'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        blog_image:
            uri_prefix: /uploads/images
            upload_destination: '%kernel.project_dir%/public/uploads/images'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        
        product_document:
            uri_prefix: /uploads/product-documents
            upload_destination: '%kernel.project_dir%/public/uploads/product-documents'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer