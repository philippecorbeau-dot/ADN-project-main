name: 🚀 Deploy ADN Family Office

on:
  # Déploiement automatique sur push
  push:
    branches:
      - main      # → Production
      - develop   # → Staging
  
  # Déploiement manuel (depuis GitHub Actions)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  SSH_USER: yarpcur
  SSH_HOST: ssh.cluster100.hosting.ovh.net
  SSH_PORT: 22
  PHP_PATH: /usr/local/php8.2/bin/php

jobs:
  build-and-deploy:
    name: 📦 Build & 🚀 Déploiement
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances npm
        run: npm ci

      - name: 🔨 Build des assets
        run: npm run build

      - name: 🔑 Configuration SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 🎯 Déterminer l'environnement
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            ENV="staging"
          else
            echo "❌ Branche non configurée pour le déploiement"
            exit 1
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "📍 Déploiement sur: $ENV"

      - name: 🚀 Déploiement STAGING
        if: steps.env.outputs.environment == 'staging'
        run: |
          # Sync des assets buildés vers le serveur
          echo "📤 Envoi des assets buildés..."
          rsync -avz --delete -e "ssh -p ${{ env.SSH_PORT }}" \
            public/build/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:~/www-staging/public/build/
          
          # Déploiement via SSH
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'ENDSSH'
            set -e
            source ~/.bash_profile 2>/dev/null || source ~/.bashrc 2>/dev/null || true
            
            echo "🚀 Déploiement STAGING en cours..."
            
            cd ~/www-staging
            
            # Pull des dernières modifications
            echo "📥 Récupération du code..."
            git fetch origin develop
            git reset --hard origin/develop
            
            # Restaurer les assets buildés (écrasés par git reset)
            echo "📦 Les assets ont été envoyés séparément"
            
            # Installation des dépendances PHP
            echo "📦 Installation des dépendances Composer..."
            /usr/local/php8.2/bin/php ~/bin/composer install --no-dev --optimize-autoloader --no-interaction
            
            # Migrations de base de données
            echo "🗄️ Vérification des migrations..."
            /usr/local/php8.2/bin/php bin/console doctrine:migrations:status
            echo "🗄️ Exécution des migrations..."
            /usr/local/php8.2/bin/php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
            
            # Vidage du cache
            echo "🧹 Vidage du cache..."
            /usr/local/php8.2/bin/php bin/console cache:clear --env=prod
            /usr/local/php8.2/bin/php bin/console cache:warmup --env=prod
            
            echo "✅ Déploiement STAGING terminé !"
          ENDSSH
          
          # Re-sync des assets après git reset
          echo "📤 Re-envoi des assets après git reset..."
          rsync -avz --delete -e "ssh -p ${{ env.SSH_PORT }}" \
            public/build/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:~/www-staging/public/build/

      - name: 🚀 Déploiement PRODUCTION
        if: steps.env.outputs.environment == 'production'
        run: |
          # Sync des assets buildés vers le serveur
          echo "📤 Envoi des assets buildés..."
          rsync -avz --delete -e "ssh -p ${{ env.SSH_PORT }}" \
            public/build/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:~/www/public/build/
          
          # Déploiement via SSH
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'ENDSSH'
            set -e
            source ~/.bash_profile 2>/dev/null || source ~/.bashrc 2>/dev/null || true
            
            echo "🚀 Déploiement PRODUCTION en cours..."
            
            cd ~/www
            
            # Pull des dernières modifications
            echo "📥 Récupération du code..."
            git fetch origin main
            git reset --hard origin/main
            
            # Installation des dépendances PHP
            echo "📦 Installation des dépendances Composer..."
            /usr/local/php8.2/bin/php ~/bin/composer install --no-dev --optimize-autoloader --no-interaction
            
            # Migrations de base de données
            echo "🗄️ Vérification des migrations..."
            /usr/local/php8.2/bin/php bin/console doctrine:migrations:status
            echo "🗄️ Exécution des migrations..."
            /usr/local/php8.2/bin/php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
            
            # Vidage du cache
            echo "🧹 Vidage du cache..."
            /usr/local/php8.2/bin/php bin/console cache:clear --env=prod
            /usr/local/php8.2/bin/php bin/console cache:warmup --env=prod
            
            echo "✅ Déploiement PRODUCTION terminé !"
          ENDSSH
          
          # Re-sync des assets après git reset
          echo "📤 Re-envoi des assets après git reset..."
          rsync -avz --delete -e "ssh -p ${{ env.SSH_PORT }}" \
            public/build/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:~/www/public/build/

      - name: 📊 Résumé
        run: |
          echo "## 🚀 Déploiement terminé" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Paramètre | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environnement | ${{ steps.env.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auteur | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Assets | ✅ Buildés et déployés |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ✅ Exécutées |" >> $GITHUB_STEP_SUMMARY
